---
# Exemple de structure attendue pour la variable docker_config :
#
# images:
#   - name: nginx:latest
#     source: pull
# containers:
#   - name: mon_nginx
#     image: nginx:latest
#     state: started
#     ports:
#       - "8080:80"
#     env:
#       ENV_VAR: valeur
#     restart_policy: unless-stopped

- name: Gestion images et conteneurs Docker
  hosts: ubuntu
  become: true
  gather_facts: false
  collections:
    - community.docker

  vars:
    parsed_config: "{{ docker_config | from_yaml }}"

  tasks:
    - name: Télécharger/construire les images Docker
      community.docker.docker_image:
        name: "{{ item.name }}"
        source: "{{ item.source | default('pull') }}"
      loop: "{{ parsed_config.images | default([]) }}"

    - name: Lancer les conteneurs
      community.docker.docker_container:
        name: "{{ item.name }}"
        image: "{{ item.image }}"
        state: "{{ item.state | default('started') }}"
        ports: "{{ item.ports | default([]) }}"
        env: "{{ item.env | default({}) }}"
        restart_policy: "{{ item.restart_policy | default('unless-stopped') }}"
      loop: "{{ parsed_config.containers | default([]) }}"

    - name: Confirmation
      ansible.builtin.debug:
        msg: "Conteneurs traités : {{ parsed_config.containers | map(attribute='name') | list }}."
