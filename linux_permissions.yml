---
# Exemple de structure attendue pour la variable linux_config :
#
# users:
#   - name: monuser
#     groups: "docker,sudo"
#     append: true
#     sudo_nopasswd: true
#   - name: autreuser
#     groups: "www-data"
#     append: true
#     sudo_nopasswd: false

- name: Gestion des droits Linux (sudo, groupes)
  hosts: ubuntu
  become: true
  gather_facts: false

  vars:
    parsed_config: "{{ linux_config | from_yaml }}"

  tasks:
    - name: Ajouter les utilisateurs aux groupes spécifiés
      ansible.builtin.user:
        name: "{{ item.name }}"
        groups: "{{ item.groups }}"
        append: "{{ item.append | default(true) }}"
      loop: "{{ parsed_config.users | default([]) }}"
      when: item.groups is defined and item.groups | length > 0

    - name: Accorder sudo aux utilisateurs demandés
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ item.name }}-custom"
        content: "{{ item.name }} ALL=(ALL) {{ 'NOPASSWD:' if item.sudo_nopasswd | default(false) else '' }} ALL\n"
        mode: '0440'
        validate: 'visudo -cf %s'
      loop: "{{ parsed_config.users | default([]) }}"
      when: item.grant_sudo | default(false) | bool

    - name: Confirmation
      ansible.builtin.debug:
        msg: "Droits Linux mis à jour pour {{ parsed_config.users | map(attribute='name') | list }}."
